services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: floodlens
      POSTGRES_USER: floodlens
      POSTGRES_PASSWORD: floodlens
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floodlens -d floodlens"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - floodlens_postgres:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://floodlens:floodlens@db:5432/floodlens
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      DOCUMENT_UPLOAD_DIR: /app/storage/documents
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
    ports:
      - "8000:8000"
    volumes:
      - ../artifacts:/app/artifacts:ro
      - ../data:/app/data:ro
      - floodlens_uploads:/app/storage/documents
      - floodlens_logs:/app/backend/logs

volumes:
  floodlens_postgres:
  floodlens_uploads:
  floodlens_logs:
